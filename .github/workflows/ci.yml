name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "Lab 5.slnx"

      - name: Build
        run: dotnet build "Lab 5.slnx" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "Lab 5.slnx" --configuration Release --no-build --verbosity normal
